# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      # - windows (build fails, need to write process.go with windows support - maybe later)
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/lazyproc

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: lazyproc
    homepage: "https://github.com/blucin/lazyproc"
    description: "A TUI process orchestrator with git worktree support"
    license: "MIT"
    repository:
      owner: blucin
      name: homebrew-tap
      token: "{{ .Env.TAP_TOKEN }}"

nfpms:
  - package_name: lazyproc
    homepage: "https://github.com/blucin/lazyproc"
    description: "A TUI process orchestrator with git worktree support"
    maintainer: "Akshar Patel <94466270+blucin@users.noreply.github.com>"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk

# Let's keep this :)
release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
